# Configuration file for rank prefixes and name colors in NaturalSchool.
# Supporting MiniMessage gradients/RGB colors and ItemsAdder font images/icons.
# Example:
# ranks:
#   KETUA_YAYASAN:
#     prefix: ":ia_owner_icon: <gradient:#ff0000:#ff7777><bold>[Ketua Yayasan]</bold></gradient> "
#     name-color: "<white>"

ranks:
  KETUA_YAYASAN:
    prefix: ":ia_owner_icon: <gradient:#ff0000:#ff7777><bold>[Ketua Yayasan]</bold></gradient> "
    name-color: "<white>"
  WAKIL_KETUA_YAYASAN:
